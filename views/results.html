<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Results - SchemeSeeker</title>
  <meta name="description" content="View matching government schemes based on your eligibility.">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="bi bi-search-heart"></i> SchemeSeeker
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="bi bi-list" style="font-size: 1.5rem;"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door"></i> Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/form"><i class="bi bi-search"></i> Find Schemes</a></li>
          <li class="nav-item"><a class="nav-link active" href="/results?browse=all"><i class="bi bi-grid"></i> All Schemes</a></li>
          <li class="nav-item ms-lg-2">
            <div class="lang-switcher">
              <button class="lang-btn active" data-lang="en">EN</button>
              <button class="lang-btn" data-lang="bn">BN</button>
            </div>
          </li>
        </ul>
        <ul class="navbar-nav ms-lg-3" id="authNav"></ul>
      </div>
    </div>
  </nav>

  <!-- Results Header -->
  <section class="results-header">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-8">
          <h1 class="text-white mb-2"><i class="bi bi-search-heart"></i> <span id="resultsTitle">Scheme Results</span></h1>
          <p class="text-white-50 mb-0" id="resultsSubtitle">Showing schemes matching your criteria</p>
          <div id="resultsSummary" class="mt-2"></div>
        </div>
        <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
          <a href="/form" class="btn btn-outline-light">
            <i class="bi bi-arrow-left"></i> Modify Search
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- Results Section -->
  <section class="py-5" style="background: var(--body-bg);">
    <div class="container">
      <!-- Filters -->
      <div class="filter-bar d-flex flex-wrap gap-2 align-items-center mb-4">
        <span class="fw-semibold text-secondary"><i class="bi bi-funnel"></i> Filter:</span>
        <button class="filter-btn active" onclick="filterResults('all', this)">All</button>
        <button class="filter-btn" onclick="filterResults('central', this)">Central</button>
        <button class="filter-btn" onclick="filterResults('state', this)">State</button>
        <div class="ms-auto d-flex gap-2">
          <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search schemes..." style="width: 200px;" onkeyup="searchSchemes()">
        </div>
      </div>

      <!-- Results Grid -->
      <div class="row g-4" id="resultsContainer">
        <!-- Results loaded by JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer mt-auto">
    <div class="container">
      <div class="footer-bottom">
        <p class="mb-0">&copy; 2026 SchemeSeeker. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <div class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    // Handle browse mode vs eligibility results mode
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const browse = urlParams.get('browse');
      const category = urlParams.get('category');
      const scope = urlParams.get('scope');

      if (browse === 'all') {
        document.getElementById('resultsTitle').textContent = 'All Schemes';
        document.getElementById('resultsSubtitle').textContent = 'Browse all available government schemes';
        loadSchemes('resultsContainer', { limit: 50 });
      } else if (category) {
        loadSchemes('resultsContainer', { category, limit: 50 });
      } else if (scope) {
        document.getElementById('resultsTitle').textContent = scope === 'central' ? 'Central Schemes' : 'State Schemes';
        loadSchemes('resultsContainer', { scope, limit: 50 });
      } else {
        loadResults();
      }
    });

    function filterResults(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const cards = document.querySelectorAll('.scheme-card');
      cards.forEach(card => {
        const badge = card.querySelector('.scheme-scope-badge');
        if (type === 'all') {
          card.closest('.col-md-6').style.display = '';
        } else if (badge.classList.contains(`scope-${type}`)) {
          card.closest('.col-md-6').style.display = '';
        } else {
          card.closest('.col-md-6').style.display = 'none';
        }
      });
    }

    function searchSchemes() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('.scheme-card');
      cards.forEach(card => {
        const title = card.querySelector('.scheme-title').textContent.toLowerCase();
        const desc = card.querySelector('.scheme-description').textContent.toLowerCase();
        if (title.includes(query) || desc.includes(query)) {
          card.closest('.col-md-6').style.display = '';
        } else {
          card.closest('.col-md-6').style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
