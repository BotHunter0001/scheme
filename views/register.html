<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SchemeSeeker</title>
  <meta name="description" content="Create a SchemeSeeker account to save and track government schemes.">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="bi bi-person-plus" style="font-size: 3rem;"></i>
      <h2 class="mt-3">Create Account</h2>
      <p>Join SchemeSeeker to save schemes</p>
    </div>
    <div class="auth-body">
      <form id="registerForm">
        <div class="mb-3">
          <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="name" name="name" required placeholder="Enter your full name">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="Create a password (min 6 characters)">
        </div>
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
        </div>

        <hr class="my-4">
        <p class="text-secondary small mb-3"><i class="bi bi-info-circle"></i> Optional: Fill these for faster eligibility checks</p>

        <div class="row g-3">
          <div class="col-md-6">
            <label for="age" class="form-label">Age</label>
            <input type="number" class="form-control" id="age" name="age" min="0" max="120" placeholder="Your age">
          </div>
          <div class="col-md-6">
            <label for="gender" class="form-label">Gender</label>
            <select class="form-select" id="gender" name="gender">
              <option value="" selected>Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="income" class="form-label">Annual Income (Rs.)</label>
            <input type="number" class="form-control" id="income" name="income" placeholder="Annual family income">
          </div>
          <div class="col-md-6">
            <label for="occupation" class="form-label">Occupation</label>
            <select class="form-select" id="occupation" name="occupation">
              <option value="" selected>Select</option>
              <option value="farmer">Farmer</option>
              <option value="student">Student</option>
              <option value="unemployed">Unemployed</option>
              <option value="self_employed">Self Employed</option>
              <option value="private_sector">Private Sector</option>
              <option value="government">Government Employee</option>
              <option value="homemaker">Homemaker</option>
              <option value="retired">Retired</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="education" class="form-label">Education</label>
            <select class="form-select" id="education" name="education">
              <option value="" selected>Select</option>
              <option value="none">No Formal</option>
              <option value="primary">Primary</option>
              <option value="8th">Class 8</option>
              <option value="10th">Class 10</option>
              <option value="12th">Class 12</option>
              <option value="graduate">Graduate</option>
              <option value="postgraduate">Postgraduate</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="caste" class="form-label">Caste Category</label>
            <select class="form-select" id="caste" name="caste">
              <option value="" selected>Select</option>
              <option value="general">General</option>
              <option value="sc">SC</option>
              <option value="st">ST</option>
              <option value="obc">OBC</option>
              <option value="minority">Minority</option>
            </select>
          </div>
          <div class="col-12">
            <label for="district" class="form-label">District</label>
            <input type="text" class="form-control" id="district" name="district" placeholder="Your district in West Bengal">
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-4">
          <i class="bi bi-person-plus"></i> Create Account
        </button>
      </form>
    </div>
    <div class="auth-footer">
      <p class="mb-0">Already have an account? <a href="/login" class="fw-semibold">Login here</a></p>
      <a href="/" class="text-secondary small d-block mt-2"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
