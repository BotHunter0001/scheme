<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SchemeSeeker</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .admin-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .admin-card-header {
      background: linear-gradient(135deg, #1a56db 0%, #1e429f 100%);
      padding: 2rem;
      text-align: center;
      color: white;
    }
    .admin-card-body {
      padding: 2rem;
    }
  </style>
</head>
<body class="admin-login-page">
  <div class="admin-card">
    <div class="admin-card-header">
      <i class="bi bi-shield-lock" style="font-size: 3rem;"></i>
      <h2 class="mt-3">Admin Panel</h2>
      <p class="mb-0">SchemeSeeker Administration</p>
    </div>
    <div class="admin-card-body">
      <form id="adminLoginForm">
        <div class="mb-3">
          <label for="email" class="form-label">Admin Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" name="email" required placeholder="admin@schemeseeker.in">
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password" required placeholder="Enter admin password">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right"></i> Login to Dashboard
        </button>
      </form>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Logging in...';

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await response.json();

        if (data.success) {
          window.location.href = '/admin/dashboard';
        } else {
          showToast(data.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Login to Dashboard';
        }
      } catch (error) {
        showToast('Login failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Login to Dashboard';
      }
    });

    function showToast(message, type = 'success') {
      const container = document.querySelector('.toast-container') || (() => {
        const c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); return c;
      })();
      const toast = document.createElement('div');
      toast.className = `toast-item toast-${type}`;
      toast.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-x-circle'}"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }
  </script>
</body>
</html>
